<!DOCTYPE html>
<html>
<head>
    <title>Team Needs Widget - Local Test</title>
    <script src="../highcharts.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 20px;
            background: #f5f5f5;
        }
        #container {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <h1>Team Needs Widget - Local Test</h1>
    <div id="container"></div>

    <script>
        // Sample data
        const sampleData = {
            teamAbbr: 'KC',
            teamColor: '#E31837',
            teamNeeds: 'RB, WR, CB, OL, LB',
            gmName: 'Brett Veach',
            hcName: 'Andy Reid',
            ocName: 'Matt Nagy',
            dcName: 'Steve Spagnuolo'
        };

        Highcharts.chart('container', {
            chart: {
                type: 'scatter',
                backgroundColor: '#ffffff',
                height: 240,
                spacing: [5, 5, 5, 5]
            },
            title: {
                text: null
            },
            legend: {
                enabled: false
            },
            credits: {
                enabled: false
            },
            xAxis: {
                min: 0,
                max: 100,
                visible: false
            },
            yAxis: {
                min: 0,
                max: 100,
                visible: false
            },
            tooltip: {
                enabled: false
            },
            plotOptions: {
                scatter: {
                    marker: {
                        enabled: false
                    },
                    enableMouseTracking: false
                }
            },
            series: [
                {
                    name: 'FourColumns',
                    data: [{
                        x: 50,
                        y: 50,
                        teamColor: sampleData.teamColor,
                        teamNeeds: sampleData.teamNeeds
                    }],
                    dataLabels: {
                        enabled: true,
                        useHTML: true,
                        format: "<div style='width:350px;padding:15px 10px 15px 15px;border-left:4px solid {point.teamColor};background:#f8f8f8;'><div style='font-size:14px;font-weight:700;color:#333;margin-bottom:5px;'>TOP 5 TEAM NEEDS</div><div style='font-size:11px;color:#999;text-transform:uppercase;margin-bottom:18px;'>ENTERING FREE AGENCY</div><div style='font-size:32px;font-weight:700;color:#333;line-height:1.3;'>{point.teamNeeds}</div></div>",
                        align: 'center',
                        verticalAlign: 'middle'
                    }
                }
            ]
        });
    </script>
</body>
</html>
