<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Page Header - Mobile (1024px)</title>
  <script src="../highcharts.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,500;0,700;0,800;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <style>
    body { background: #f0f0f0; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; padding: 20px 0; }
    #container { width: 1024px; background: transparent; }
  </style>
</head>
<body>
  <div id="container"></div>
  <script>
    // Sample data matching field wells:
    // 0:TeamName, 1:TeamColor, 2:Record, 3:GM, 4:GMSince, 5:HC, 6:HCSince, 7:OC, 8:OCSince, 9:DC, 10:DCSince
    var teamName = "Atlanta Falcons";
    var teamColor = "#A71930";
    var record = "8-9, 2nd NFC South";
    var gm = "Terry Fontenot";
    var gmSince = "2021";
    var hc = "Raheem Morris";
    var hcSince = "2024";
    var oc = "Dirk Koetter";
    var ocSince = "2025";
    var dc = "Jeff Ulbrich";
    var dcSince = "2025";

    Highcharts.chart('container', {
      chart: {
        type: 'scatter',
        backgroundColor: 'transparent',
        height: 750,
        spacing: [0, 0, 0, 0]
      },
      title: { text: null },
      legend: { enabled: false },
      credits: { enabled: false },
      xAxis: { min: 0, max: 100, visible: false },
      yAxis: { min: 0, max: 100, visible: false },
      tooltip: { enabled: false },
      plotOptions: {
        scatter: {
          marker: { enabled: false },
          enableMouseTracking: false
        }
      },
      series: [{
        name: 'Header',
        data: [{
          x: 0,
          y: 50
        }],
        dataLabels: {
          enabled: true,
          useHTML: true,
          formatter: function() {
            return '<div style="font-family:Barlow Condensed,sans-serif;width:960px;">'
              + '<div style="font-size:120px;font-weight:900;color:' + teamColor + ';text-transform:uppercase;letter-spacing:1px;margin-bottom:20px;line-height:1;">' + teamName + '</div>'
              + '<div style="margin-bottom:14px;"><div style="font-size:32px;color:#6b7280;font-weight:500;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:2px;">2025 RECORD</div><div style="font-size:42px;color:#111;font-weight:700;text-transform:uppercase;font-style:italic;">' + record + '</div></div>'
              + '<div style="margin-bottom:14px;"><div style="font-size:32px;color:#6b7280;font-weight:500;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:2px;">GENERAL MANAGER (SINCE ' + gmSince + ')</div><div style="font-size:42px;color:#111;font-weight:700;text-transform:uppercase;font-style:italic;">' + gm + '</div></div>'
              + '<div style="margin-bottom:14px;"><div style="font-size:32px;color:#6b7280;font-weight:500;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:2px;">HEAD COACH (SINCE ' + hcSince + ')</div><div style="font-size:42px;color:#111;font-weight:700;text-transform:uppercase;font-style:italic;">' + hc + '</div></div>'
              + '<div style="margin-bottom:14px;"><div style="font-size:32px;color:#6b7280;font-weight:500;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:2px;">OFF. COORDINATOR (SINCE ' + ocSince + ')</div><div style="font-size:42px;color:#111;font-weight:700;text-transform:uppercase;font-style:italic;">' + oc + '</div></div>'
              + '<div><div style="font-size:32px;color:#6b7280;font-weight:500;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:2px;">DEF. COORDINATOR (SINCE ' + dcSince + ')</div><div style="font-size:42px;color:#111;font-weight:700;text-transform:uppercase;font-style:italic;">' + dc + '</div></div>'
              + '</div>';
          },
          align: 'left',
          verticalAlign: 'middle',
          overflow: 'allow',
          crop: false,
          style: { textOutline: 'none' }
        }
      }]
    });
  </script>
</body>
</html>
