<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Position Filter v4 - Mobile (1024px)</title>
  <script src="../highcharts.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;700;800&display=swap" rel="stylesheet">
  <style>
    body { background: #f0f0f0; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; padding: 20px 0; }
    #container { width: 1024px; background: #fff; }
  </style>
</head>
<body>
  <div id="container"></div>
  <script>
    var buttons = ['All','OFF','DEF','QB','RB','WR','TE','T','G','C','DT','ED','LB','CB','S'];
    var selected = 'All';

    Highcharts.chart('container', {
      chart: {
        type: 'scatter',
        backgroundColor: 'transparent',
        height: 198,
        spacing: [0, 0, 0, 0],
        animation: false,
        style: { fontFamily: "Barlow Condensed, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" }
      },
      title: { text: null },
      legend: { enabled: false },
      credits: { enabled: false },
      xAxis: { min: 0, max: 100, visible: false },
      yAxis: { min: 0, max: 100, visible: false },
      tooltip: { enabled: false },
      plotOptions: {
        scatter: { marker: { enabled: false, radius: 0 }, animation: false, states: { hover: { enabled: false }, select: { enabled: false }, inactive: { enabled: false } } },
        series: { enableMouseTracking: true, cursor: 'pointer', animation: false, marker: { enabled: false, radius: 0, states: { hover: { enabled: false, radius: 0 }, select: { enabled: false, radius: 0 } } } }
      },
      series: [{
        name: 'PositionFilter',
        data: buttons.map(function(label, i) {
          var row = Math.floor(i / 5);
          var col = i % 5;
          var isSelected = (label === selected);
          var isLastCol = (col === 4);
          return {
            x: 10 + col * 20,
            y: 83 - row * 33,
            label: label,
            bg: isSelected ? '#1a2b4c' : 'transparent',
            tc: isSelected ? '#ffffff' : '#1a2b4c',
            fw: '700',
            borderRight: isLastCol ? 'none' : '1px solid #c0c8d1'
          };
        }),
        dataLabels: {
          enabled: true,
          useHTML: true,
          format: "<div style='width:186px;height:62px;line-height:62px;text-align:center;font-size:28px;font-weight:{point.fw};color:{point.tc};background:{point.bg};border-right:{point.borderRight};cursor:pointer;box-sizing:border-box;text-transform:uppercase;'>{point.label}</div>",
          align: 'center',
          verticalAlign: 'middle',
          overflow: 'allow',
          crop: false,
          style: { textOutline: 'none' }
        },
        point: {
          events: {
            click: function() {
              selected = this.label;
              this.series.chart.destroy();
              alert('Selected: ' + this.label);
            }
          }
        }
      }]
    });
  </script>
</body>
</html>
