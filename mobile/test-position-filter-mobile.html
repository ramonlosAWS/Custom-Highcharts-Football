<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Position Filter — Mobile Layout</title>
  <script src="https://code.highcharts.com/11.4.6/highcharts.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #eef1f5; padding: 20px; margin: 0;
    }
    .container {
      background: white; padding: 20px; border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1); max-width: 380px;
    }
    h2 { margin: 0 0 6px 0; color: #333; font-size: 16px; }
    .subtitle { margin: 0 0 16px 0; color: #888; font-size: 12px; }
    .info {
      margin-top: 10px; padding: 8px 12px;
      background: #f0f4f8; border-radius: 4px; font-size: 12px; color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Position Filter — Mobile</h2>
    <p class="subtitle">13 buttons · 3 rows (5+4+4) · 340px fixed width</p>
    <div id="chart"></div>
    <div class="info">Selected: <span id="sel">ALL</span></div>
  </div>

  <script>
    const positions = ['ALL','QB','RB','WR','TE','OT','OG','OC','DT','ED','LB','CB','DS'];
    let selected = 'ALL';

    const chartW = 340, divPx = 56, maxPerRow = 5;
    const pxPerUnit = chartW / 100;
    const btnU = divPx / pxPerUnit;

    // Split: 5+4+4
    const rows = [];
    for (let i = 0; i < positions.length; i += maxPerRow) {
      rows.push(positions.slice(i, i + maxPerRow));
    }

    function rowY(ri) {
      const top = 85, bottom = 15;
      return top - ri * ((top - bottom) / (rows.length - 1));
    }

    function getData() {
      const pts = [];
      rows.forEach((row, ri) => {
        const span = (row.length - 1) * btnU;
        const startX = (100 - span) / 2;
        row.forEach((lbl, ci) => {
          pts.push({
            x: startX + ci * btnU,
            y: rowY(ri),
            label: lbl,
            bg: lbl === selected ? '#1a2b4c' : 'transparent',
            tc: lbl === selected ? '#ffffff' : '#1a2b4c',
            fw: '600',
            div: ci < row.length - 1 ? '1px solid #c0c8d1' : 'none'
          });
        });
      });
      return pts;
    }

    Highcharts.chart('chart', {
      chart: {
        type: 'scatter', backgroundColor: 'transparent',
        height: 110, width: chartW,
        spacing: [5, 0, 5, 0], animation: false,
        style: { fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" }
      },
      title: { text: null }, legend: { enabled: false }, credits: { enabled: false },
      xAxis: { min: 0, max: 100, visible: false },
      yAxis: { min: 0, max: 100, visible: false },
      tooltip: { enabled: false },
      plotOptions: {
        scatter: { marker: { enabled: false, radius: 0 }, animation: false,
          states: { hover: { enabled: false }, select: { enabled: false }, inactive: { enabled: false } } },
        series: { enableMouseTracking: true, cursor: 'pointer', animation: false,
          marker: { enabled: false, radius: 0,
            states: { hover: { enabled: false, radius: 0 }, select: { enabled: false, radius: 0 } } } }
      },
      series: [{
        name: 'Pos', data: getData(),
        dataLabels: {
          enabled: true, useHTML: true,
          format: "<div style='width:56px;height:26px;line-height:26px;text-align:center;font-size:11px;font-weight:{point.fw};color:{point.tc};background:{point.bg};border-right:{point.div};cursor:pointer;box-sizing:border-box;'>{point.label}</div>",
          align: 'center', verticalAlign: 'middle', overflow: 'allow', crop: false,
          style: { textOutline: 'none' }
        },
        point: { events: { click: function() {
          selected = this.label;
          document.getElementById('sel').textContent = selected;
          this.series.setData(getData(), true, false, false);
        }}}
      }]
    });
  </script>
</body>
</html>
