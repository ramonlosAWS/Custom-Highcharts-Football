<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cap Space — Mobile (1024px)</title>
  <script src="../../highcharts.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;700;800&display=swap" rel="stylesheet">
  <style>
    body { background: #f0f0f0; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; padding: 20px 0; }
    #container { width: 1024px; background: #fff; }
  </style>
</head>
<body>
  <div id="container"></div>
  <script>
    Highcharts.chart('container', {
      chart: { type: 'scatter', backgroundColor: 'transparent', height: 280, spacing: [5,0,5,0],
        style: { fontFamily: "Barlow Condensed, sans-serif" } },
      title: { text: null }, legend: { enabled: false }, credits: { enabled: false },
      xAxis: { min: 0, max: 100, visible: false },
      yAxis: { min: 0, max: 100, visible: false, reversed: true },
      tooltip: { enabled: false },
      plotOptions: { scatter: { marker: { enabled: false }, enableMouseTracking: false } },
      series: [
        {
          type: 'scatter', name: 'CapSpace',
          data: [{ x: 3, y: 10, metricLabel: 'CAP SPACE', millions: 54.9, rank: 5, barPct: '87.5%', barColor: '#10b981', textColor: '#333' }],
          dataLabels: {
            enabled: true, useHTML: true,
            format: "<div style='display:flex;align-items:center;gap:14px;padding:2px 0;font-family:Barlow Condensed,sans-serif;width:860px;'><div style='width:6px;height:48px;background:{point.barColor};border-radius:3px;flex-shrink:0;'></div><div style='flex:1;'><div style='font-size:14px;color:#888;font-weight:600;letter-spacing:0.5px;'>{point.metricLabel}</div><div style='display:flex;align-items:center;gap:14px;'><div style='font-size:22px;font-weight:700;color:{point.textColor};white-space:nowrap;width:200px;flex-shrink:0;'>${point.millions:.1f}M</div><div style='background:#e8e8e8;color:#555;border-radius:8px;padding:4px 0;width:56px;text-align:center;font-size:18px;font-weight:700;flex-shrink:0;'>#{point.rank}</div><div style='flex:1;background:#e5e7eb;border-radius:4px;height:16px;'><div style='width:{point.barPct};max-width:100%;background:{point.barColor};height:16px;border-radius:4px;'></div></div></div></div></div>",
            align: 'left', verticalAlign: 'middle', style: { textOutline: 'none' }, overflow: 'allow', crop: false
          }
        },
        {
          type: 'scatter', name: 'ActiveCap',
          data: [{ x: 3, y: 40, metricLabel: 'ACTIVE CAP SPENDING', millions: 219.1, rank: 12, barPct: '65.6%', barColor: '#10b981', textColor: '#333' }],
          dataLabels: {
            enabled: true, useHTML: true,
            format: "<div style='display:flex;align-items:center;gap:14px;padding:2px 0;font-family:Barlow Condensed,sans-serif;width:860px;'><div style='width:6px;height:48px;background:#10b981;border-radius:3px;flex-shrink:0;'></div><div style='flex:1;'><div style='font-size:14px;color:#888;font-weight:600;letter-spacing:0.5px;'>{point.metricLabel}</div><div style='display:flex;align-items:center;gap:14px;'><div style='font-size:22px;font-weight:700;color:{point.textColor};white-space:nowrap;width:200px;flex-shrink:0;'>${point.millions:.1f}M</div><div style='background:#e8e8e8;color:#555;border-radius:8px;padding:4px 0;width:56px;text-align:center;font-size:18px;font-weight:700;flex-shrink:0;'>#{point.rank}</div><div style='flex:1;background:#e5e7eb;border-radius:4px;height:16px;'><div style='width:{point.barPct};max-width:100%;background:#10b981;height:16px;border-radius:4px;'></div></div></div></div></div>",
            align: 'left', verticalAlign: 'middle', style: { textOutline: 'none' }, overflow: 'allow', crop: false
          }
        },
        {
          type: 'scatter', name: 'DeadMoney',
          data: [{ x: 3, y: 70, metricLabel: 'DEAD MONEY', millions: 18.2, rank: 6, tierText: 'MINIMAL', tierBg: '#dcfce7', tierColor: '#16a34a', badgeBg: '#dcfce7', badgeColor: '#16a34a' }],
          dataLabels: {
            enabled: true, useHTML: true,
            format: "<div style='display:flex;align-items:center;gap:14px;padding:2px 0;font-family:Barlow Condensed,sans-serif;width:860px;'><div style='width:6px;height:48px;background:#9ca3af;border-radius:3px;flex-shrink:0;'></div><div style='flex:1;'><div style='font-size:14px;color:#888;font-weight:600;letter-spacing:0.5px;'>{point.metricLabel}</div><div style='display:flex;align-items:center;gap:14px;'><div style='font-size:22px;font-weight:700;color:#6b7280;white-space:nowrap;width:200px;flex-shrink:0;'>${point.millions:.1f}M</div><div style='background:{point.badgeBg};color:{point.badgeColor};border-radius:8px;padding:4px 0;width:56px;text-align:center;font-size:18px;font-weight:700;flex-shrink:0;'>#{point.rank}</div><div style='background:{point.tierBg};color:{point.tierColor};font-size:14px;font-weight:700;padding:4px 14px;border-radius:12px;letter-spacing:0.3px;'>{point.tierText}</div></div></div></div>",
            align: 'left', verticalAlign: 'middle', style: { textOutline: 'none' }, overflow: 'allow', crop: false
          }
        }
      ]
    });
  </script>
</body>
</html>
