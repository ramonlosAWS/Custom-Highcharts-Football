<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFL Draft Picks Widget - Test</title>
    <script src="../highcharts.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 40px; background: #f5f5f5; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { margin: 0 0 10px 0; font-size: 24px; color: #333; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
        .controls { margin-bottom: 20px; padding: 15px; background: #f8f8f8; border-radius: 8px; }
        select { padding: 8px 12px; font-size: 14px; border: 1px solid #ddd; border-radius: 4px; width: 100%; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 13px; color: #555; }
    </style>
</head>
<body>
    <div class="container">
        <h1>NFL Draft Picks Widget</h1>
        <div class="subtitle">Cap-space bar style — Highcharts 11.4.6</div>
        <div class="controls">
            <label>Select Team:</label>
            <select id="team-select" onchange="updateChart()">
                <option value="0">Atlanta Falcons</option>
                <option value="1">Buffalo Bills</option>
                <option value="2">Chicago Bears</option>
            </select>
        </div>
        <div id="chart-container"></div>
    </div>
    <script>
        const sampleData = [
            { team: "Atlanta Falcons",  picks2026: "1.8, 2.40, 3.72, 4.104, 5.136, 6.168, 7.200", picks2027: "Rd 1, Rd 2, Rd 3, Rd 4, Rd 5, Rd 6, Rd 7" },
            { team: "Buffalo Bills",    picks2026: "1.28, 2.60, 4.124, 5.156, 6.188, 7.220",       picks2027: "Rd 1, Rd 2, Rd 4, Rd 5, Rd 6, Rd 7" },
            { team: "Chicago Bears",    picks2026: "1.1, 2.33, 3.65, 4.97, 5.129, 6.161, 7.193",   picks2027: "Rd 1, Rd 2, Rd 3, Rd 4, Rd 5, Rd 6, Rd 7" }
        ];

        function updateChart() {
            const idx = parseInt(document.getElementById('team-select').value);
            const d = sampleData[idx];

            Highcharts.chart('chart-container', {
                chart: {
                    type: 'scatter', backgroundColor: 'transparent', height: 130,
                    spacing: [5, 0, 5, 0],
                    style: { fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" }
                },
                title: { text: null }, legend: { enabled: false }, credits: { enabled: false },
                xAxis: { min: 0, max: 100, visible: false },
                yAxis: { min: 0, max: 100, visible: false, reversed: true },
                tooltip: { enabled: false },
                plotOptions: { scatter: { marker: { enabled: false }, enableMouseTracking: false } },
                series: [
                    {
                        type: 'scatter', name: '2026Picks',
                        data: [{ x: 3, y: 15, picks: d.picks2026 }],
                        dataLabels: {
                            enabled: true, useHTML: true,
                            format: "<div style='display:flex;align-items:center;gap:6px;padding:2px 0;'><div style='width:4px;height:34px;background:#3b82f6;border-radius:2px;flex-shrink:0;'></div><div><div style='font-size:9px;color:#888;font-weight:600;letter-spacing:0.5px;'>2026 DRAFT PICKS</div><div style='font-size:13px;font-weight:700;color:#333;line-height:1.5;white-space:nowrap;'>{point.picks}</div></div></div>",
                            align: 'left', verticalAlign: 'middle',
                            style: { textOutline: 'none' }, overflow: 'allow', crop: false
                        }
                    },
                    {
                        type: 'scatter', name: '2027Picks',
                        data: [{ x: 3, y: 65, picks: d.picks2027 }],
                        dataLabels: {
                            enabled: true, useHTML: true,
                            format: "<div style='display:flex;align-items:center;gap:6px;padding:2px 0;'><div style='width:4px;height:34px;background:#8b5cf6;border-radius:2px;flex-shrink:0;'></div><div><div style='font-size:9px;color:#888;font-weight:600;letter-spacing:0.5px;'>2027 DRAFT PICKS</div><div style='font-size:13px;font-weight:700;color:#333;line-height:1.5;white-space:nowrap;'>{point.picks}</div></div></div>",
                            align: 'left', verticalAlign: 'middle',
                            style: { textOutline: 'none' }, overflow: 'allow', crop: false
                        }
                    }
                ]
            });
        }
        updateChart();
    </script>
</body>
</html>
