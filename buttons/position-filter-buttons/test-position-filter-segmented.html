<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Position Filter - Segmented Style</title>
  <script src="https://code.highcharts.com/11.4.6/highcharts.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      padding: 40px;
      margin: 0;
    }
    .container {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      max-width: 1250px;
    }
    h2 { margin: 0 0 20px 0; color: #333; }
    #chart-container { width: 1200px; height: 50px; }
    .info { margin-top: 20px; padding: 15px; background: #f0f4f8; border-radius: 4px; font-size: 13px; color: #555; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Position Filter - Segmented Control Style (1200px, 9 buttons)</h2>
    <div id="chart-container"></div>
    <div class="info">
      <strong>Selected:</strong> <span id="selected-value">ALL</span>
    </div>
  </div>

  <script>
    // Simulated data - 9 position groups (ALL + 8 positions)
    const positions = ['ALL', 'QB', 'RB', 'WR', 'TE', 'OT', 'IOL', 'DT', 'EDGE'];
    let selectedValue = 'ALL';

    function getChartData() {
      return positions.map((pos, index) => ({
        x: 14.5 + (index * 9.5),
        y: 50,
        label: pos,
        bgColor: pos === selectedValue ? '#1e3a5f' : '#ffffff',
        textColor: pos === selectedValue ? '#ffffff' : '#1e3a5f',
        borderLeft: index === 0 ? '1px solid #1e3a5f' : 'none',
        borderRadius: index === 0 ? '3px 0 0 3px' : (index === 8 ? '0 3px 3px 0' : '0')
      }));
    }

    const chart = Highcharts.chart('chart-container', {
      chart: {
        type: 'scatter',
        backgroundColor: 'transparent',
        height: 50,
        width: 1200,
        spacing: [5, 10, 5, 10],
        animation: false,
        style: {
          fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
        }
      },
      title: { text: null },
      legend: { enabled: false },
      credits: { enabled: false },
      xAxis: { min: 0, max: 100, visible: false },
      yAxis: { min: 0, max: 100, visible: false },
      tooltip: { enabled: false },
      plotOptions: {
        scatter: { marker: { enabled: false }, animation: false },
        series: { enableMouseTracking: true, cursor: 'pointer', animation: false }
      },
      series: [
        {
          name: 'Label',
          data: [{ x: 3.5, y: 50 }],
          dataLabels: {
            enabled: true,
            useHTML: true,
            format: "<div style='color:#64748b;font-size:11px;font-weight:600;letter-spacing:0.5px;white-space:nowrap;'>VIEW BY:</div>",
            align: 'center',
            verticalAlign: 'middle',
            style: { textOutline: 'none' }
          },
          enableMouseTracking: false
        },
        {
          name: 'Positions',
          data: getChartData(),
          dataLabels: {
            enabled: true,
            useHTML: true,
            format: "<div style='background:{point.bgColor};color:{point.textColor};padding:10px 0;cursor:pointer;font-weight:600;font-size:12px;text-align:center;border:1px solid #1e3a5f;border-left:{point.borderLeft};width:100px;border-radius:{point.borderRadius};'>{point.label}</div>",
            align: 'center',
            verticalAlign: 'middle',
            style: { textOutline: 'none' }
          },
          point: {
            events: {
              click: function() {
                selectedValue = this.label;
                document.getElementById('selected-value').textContent = selectedValue;
                this.series.setData(getChartData(), true, false, false);
              }
            }
          }
        }
      ]
    });
  </script>
</body>
</html>
