<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JJ Draft Capital Rank — Mini Widget</title>
    <script src="../highcharts.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 40px; background: #f5f5f5; }
        .container { max-width: 200px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2 { margin: 0 0 15px 0; font-size: 16px; color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Mini Rank Widget</h2>
        <div id="chart-container"></div>
    </div>
    <script>
        Highcharts.chart('chart-container', {
            chart: { type: 'scatter', backgroundColor: 'transparent', height: 55, spacing: [0,0,0,0],
                style: { fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" } },
            title: { text: null }, legend: { enabled: false }, credits: { enabled: false },
            xAxis: { min: 0, max: 100, visible: false },
            yAxis: { min: 0, max: 100, visible: false },
            tooltip: { enabled: false },
            plotOptions: { scatter: { marker: { enabled: false }, enableMouseTracking: false } },
            series: [{
                type: 'scatter', name: 'JJCapitalRank',
                data: [{ x: 50, y: 50, rank: 12 }],
                dataLabels: {
                    enabled: true, useHTML: true,
                    format: "<div style='display:flex;flex-direction:column;align-items:center;gap:3px;'><div style='font-size:9px;color:#888;font-weight:600;letter-spacing:0.5px;'>JJ DRAFT CAPITAL</div><div style='background:#e8e8e8;color:#555;border-radius:6px;padding:4px 0;width:48px;text-align:center;font-size:16px;font-weight:700;'>#{point.rank}</div></div>",
                    align: 'center', verticalAlign: 'middle',
                    style: { textOutline: 'none' }, overflow: 'allow', crop: false
                }
            }]
        });
    </script>
</body>
</html>
