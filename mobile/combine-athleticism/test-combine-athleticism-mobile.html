<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Combine Athleticism — Mobile (1024px)</title>
  <script src="../../highcharts.js"></script>
  <script src="../../highcharts-more.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body { background: #f0f0f0; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; padding: 20px 0; }
    #container { width: 1024px; }
  </style>
</head>
<body>
  <div id="container"></div>
  <script>
    var players = [
      { rank: 1, name: 'Homer Simpson', score: 92, barColor: '#0077c8' },
      { rank: 2, name: 'Bart Simpson', score: 72, barColor: '#ffc000' },
      { rank: 3, name: 'Nelson Muntz', score: 77, barColor: '#00b050' },
      { rank: 4, name: 'Milhouse Van Houten', score: 66, barColor: '#ffc000' },
      { rank: 5, name: 'Ralph Wiggum', score: 55, barColor: '#c00000' }
    ];
    var startY = 20, rowGap = 15;
    var rowData = players.map(function(p, i) {
      return {
        x: 0, y: startY + i * rowGap,
        rank: p.rank, playerName: p.name, score: p.score,
        barColor: p.barColor, barWidth: Math.round(((p.score - 50) / 49) * 100)
      };
    });

    Highcharts.chart('container', {
      chart: { type: 'scatter', backgroundColor: '#1a1a2e', height: 680, spacing: [15,15,15,15],
        style: { fontFamily: "'Barlow Condensed', sans-serif" }, animation: false },
      title: { text: null }, legend: { enabled: false }, credits: { enabled: false },
      xAxis: { min: 0, max: 100, visible: false },
      yAxis: { min: 0, max: 100, visible: false, reversed: true },
      tooltip: { enabled: false },
      plotOptions: { scatter: { marker: { enabled: false }, enableMouseTracking: false } },
      series: [
        {
          name: 'Title', type: 'scatter',
          data: [{ x: 0, y: 2 }],
          dataLabels: {
            enabled: true, useHTML: true,
            format: "<div><div style='font-size:36px;font-weight:900;color:#ffffff;letter-spacing:1px;text-transform:uppercase;'>Top Edge Athleticism Scores</div><div style='font-size:20px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin-top:3px;'>2026 NFL Combine</div></div>",
            align: 'left', verticalAlign: 'top', style: { textOutline: 'none' }
          }
        },
        {
          name: 'Rows', type: 'scatter', data: rowData,
          dataLabels: {
            enabled: true, useHTML: true,
            formatter: function() {
              var p = this.point;
              return "<div style='display:flex;align-items:center;width:920px;height:64px;'>"
                + "<div style='width:45px;font-size:28px;font-weight:700;color:#888;text-align:center;'>" + p.rank + "</div>"
                + "<div style='width:65px;'></div>"
                + "<div style='width:200px;font-size:22px;font-weight:800;color:#ffffff;'>" + p.playerName + "</div>"
                + "<div style='flex:1;position:relative;height:32px;overflow:visible;z-index:1;'>"
                + "<div style='position:absolute;left:0;top:0;height:100%;width:" + p.barWidth + "%;background:" + p.barColor + ";border-radius:4px;'></div>"
                + "<div style='position:absolute;top:50%;transform:translateY(-50%);left:" + p.barWidth + "%;margin-left:-24px;width:48px;height:48px;border-radius:50%;background:" + p.barColor + ";display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.4);z-index:2;'>" + p.score + "</div>"
                + "</div></div>";
            },
            align: 'left', verticalAlign: 'middle', overflow: 'allow', crop: false,
            style: { textOutline: 'none' }
          }
        },
        {
          name: 'Dividers', type: 'scatter',
          data: [{ x: 0, y: 28 }, { x: 0, y: 43 }, { x: 0, y: 58 }, { x: 0, y: 73 }],
          dataLabels: {
            enabled: true, useHTML: true,
            format: "<div style='width:920px;height:1px;background:rgba(255,255,255,0.08);margin-left:45px;'></div>",
            align: 'left', verticalAlign: 'middle', style: { textOutline: 'none' }
          }
        },
        {
          name: 'LegendBar', type: 'scatter',
          data: [{ x: 58, y: 94 }],
          dataLabels: {
            enabled: true, useHTML: true,
            format: "<div style='text-align:center;'><div style='width:340px;height:10px;border-radius:5px;background:linear-gradient(90deg,#c00000 0%,#ffc000 25%,#00b050 55%,#0077c8 100%);'></div><div style='display:flex;justify-content:space-between;width:340px;margin-top:4px;'><span style='font-size:13px;color:#666;'>50</span><span style='font-size:13px;color:#666;'>60</span><span style='font-size:13px;color:#666;'>75</span><span style='font-size:13px;color:#666;'>90</span><span style='font-size:13px;color:#666;'>99</span></div><div style='display:flex;justify-content:space-between;width:340px;margin-top:2px;'><span style='font-size:11px;color:#555;text-transform:uppercase;letter-spacing:0.5px;'>< AVG</span><span style='font-size:11px;color:#555;text-transform:uppercase;letter-spacing:0.5px;'>AVERAGE</span><span style='font-size:11px;color:#555;text-transform:uppercase;letter-spacing:0.5px;'>GOOD</span><span style='font-size:11px;color:#555;text-transform:uppercase;letter-spacing:0.5px;'>ELITE</span></div></div>",
            align: 'center', verticalAlign: 'bottom', style: { textOutline: 'none' }
          }
        }
      ]
    });
  </script>
</body>
</html>
