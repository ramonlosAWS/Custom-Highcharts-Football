<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NFL Team View Filter</title>
  <script src="../../highcharts.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #eef1f5;
      padding: 40px;
      margin: 0;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      max-width: 600px;
    }
    h2 { margin: 0 0 10px 0; color: #333; font-size: 16px; }
    .subtitle { margin: 0 0 20px 0; color: #888; font-size: 13px; }
    .info {
      margin-top: 20px; padding: 12px 15px;
      background: #f0f4f8; border-radius: 4px; font-size: 13px; color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>NFL Team View Filter</h2>
    <p class="subtitle">3 buttons. Vertical dividers, square selected fill. Click to select.</p>
    <div id="chart-container"></div>
    <div class="info">
      <strong>Selected:</strong> <span id="selected-value">TEAM SNAPSHOT</span>
    </div>
  </div>

  <script>
    const labels = ['TEAM SNAPSHOT','TEAM NEEDS','DIVISION RANKS'];
    let selectedValue = 'TEAM SNAPSHOT';
    const total = labels.length;
    const startX = 24;
    const spacing = 26;

    function getData() {
      return labels.map((lbl, i) => ({
        x: startX + i * spacing,
        y: 50,
        label: lbl,
        bg: lbl === selectedValue ? '#1a2b4c' : 'transparent',
        tc: lbl === selectedValue ? '#ffffff' : '#1a2b4c',
        fw: '600',
        div: i < total - 1 ? '1px solid #c0c8d1' : 'none'
      }));
    }

    Highcharts.chart('chart-container', {
      chart: {
        type: 'scatter', backgroundColor: 'transparent',
        height: 30, width: 500,
        spacing: [5, 0, 5, 0], animation: false,
        style: { fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" }
      },
      title: { text: null }, legend: { enabled: false }, credits: { enabled: false },
      xAxis: { min: 0, max: 100, visible: false },
      yAxis: { min: 0, max: 100, visible: false },
      tooltip: { enabled: false },
      plotOptions: {
        scatter: { marker: { enabled: false, radius: 0 }, animation: false, states: { hover: { enabled: false }, select: { enabled: false }, inactive: { enabled: false } } },
        series: { enableMouseTracking: true, cursor: 'pointer', animation: false, marker: { enabled: false, radius: 0, states: { hover: { enabled: false, radius: 0 }, select: { enabled: false, radius: 0 } } } }
      },
      series: [{
        name: 'TeamViewFilter',
        data: getData(),
        dataLabels: {
          enabled: true, useHTML: true,
          format: "<div style='width:130px;height:17px;line-height:17px;text-align:center;font-size:11px;font-weight:{point.fw};color:{point.tc};background:{point.bg};border-right:{point.div};cursor:pointer;box-sizing:border-box;white-space:nowrap;'>{point.label}</div>",
          align: 'center', verticalAlign: 'middle',
          overflow: 'allow', crop: false,
          style: { textOutline: 'none' }
        },
        point: {
          events: {
            click: function() {
              selectedValue = this.label;
              document.getElementById('selected-value').textContent = selectedValue;
              this.series.setData(getData(), true, false, false);
            }
          }
        }
      }]
    });
  </script>
</body>
</html>
